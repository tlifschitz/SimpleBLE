name: 'Build DBus'
description: 'Clone and build DBus'

runs:
  using: "composite"
  steps:
    - name: Build Expat
      uses: ./.github/actions/build-expat

    - name: Set env
      shell: bash
      run: |
        echo "DBUS_ROOT=${{ github.workspace }}/dbus/install" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/dbus/install:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: Get latest DBus commit hash
      id: dbus-hash
      shell: bash
      run: |
        DBUS_HASH=$(curl -s https://api.github.com/repos/freedesktop/dbus/commits/master | jq -r .sha)
        echo "value=$DBUS_HASH" >> $GITHUB_OUTPUT

    - name: Cache DBus
      id: cache-dbus
      uses: actions/cache@v3
      with:
        path: ${{ github.workspace }}/dbus/install
        key: ${{ runner.os }}-dbus-${{ steps.dbus-hash.outputs.value }}

    - name: Build DBus
      if: steps.cache-dbus.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone https://gitlab.freedesktop.org/dbus/dbus.git ${{ github.workspace }}/dbus
        cd ${{ github.workspace }}/dbus

        cmake -B build -DDBUS_SESSION_SOCKET_DIR=/usr/local/var/run/dbus/system_bus_socket -DDBUS_BUILD_TESTS=OFF
        cmake --build build --config Release --parallel 4
        cmake --install build --prefix ${{ github.workspace }}/dbus/install
